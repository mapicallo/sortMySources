# Builds apps/pwa and publishes to branch gh-pages (real PWA, not README).
# Repo Settings → Pages → Build and deployment: Source = Deploy from a branch, Branch = gh-pages, folder = / (root).
name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pwa-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build core + PWA
        run: |
          npm run build -w @sortmysources/core
          npm run build -w sortmysources-pwa

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/pwa/dist
          # Repo Settings → Pages must use branch gh-pages / (root), not main — or site shows README.
          force_orphan: true
